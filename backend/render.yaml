services:
  - type: web
    name: sarboshakti-backend
    env: node
    buildCommand: npm ci --only=production
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: ORG_NAME
        sync: false
      - key: ORG_ADDRESS
        sync: false
      - key: ORG_EMAIL
        sync: false
      - key: ORG_PHONE
        sync: false